name: Build

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - dotnet: "8.0.x"
            framework: "net8.0"
          - dotnet: "9.0.x"
            framework: "net9.0"
          - dotnet: "10.0.x"
            framework: "net10.0"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --framework ${{ matrix.framework }} --no-restore

      - name: Test unit
        run: dotnet test tests/EFCore.ParadeDB.PgSearch.Tests --framework ${{ matrix.framework }} --configuration Release --no-restore

      - name: Test integration
        run: dotnet test tests/EFCore.ParadeDB.PgSearch.IntegrationTests --framework ${{ matrix.framework }} --configuration Release --no-restore